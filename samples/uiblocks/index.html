<!doctype html>
<html lang="en">
  <head>
    <title>UI Blocks Integration Sample | XR Blocks</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link type="text/css" rel="stylesheet" href="../main.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/": "https://cdn.jsdelivr.net/npm/three@0.182.0/",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "@pmndrs/uikit": "https://cdn.jsdelivr.net/npm/@pmndrs/uikit@1.0.56/dist/index.min.js",
          "@pmndrs/uikit-pub-sub": "https://cdn.jsdelivr.net/npm/@pmndrs/uikit-pub-sub@1.0.56/dist/index.min.js",
          "@pmndrs/msdfonts": "https://cdn.jsdelivr.net/npm/@pmndrs/msdfonts@1.0.56/dist/index.min.js",
          "@preact/signals-core": "https://cdn.jsdelivr.net/npm/@preact/signals-core@1.12.1/dist/signals-core.mjs",
          "yoga-layout/load": "https://cdn.jsdelivr.net/npm/yoga-layout@3.2.1/dist/src/load.js",
          "uiblocks": "../../build/addons/uiblocks/src/index.js",
          "xrblocks": "../../build/xrblocks.js"
        }
      }
    </script>
  </head>

  <body>
    <script type="module">
      import {reversePainterSortStable} from '@pmndrs/uikit';
      import * as THREE from 'three';
      import {
        UICore,
        UIPanel,
        UIText,
        UIImage,
        UIIcon,
        ManipulationBehavior,
        raycastSortFunction,
      } from 'uiblocks';
      import * as xb from 'xrblocks';

      class MainScript extends xb.Script {
        constructor() {
          super();
          this.uiCore = new UICore(this);
        }

        async init() {
          const renderer = xb.core.renderer;
          renderer.localClippingEnabled = true;
          renderer.setTransparentSort(reversePainterSortStable);

          if (xb.core.input.raycaster) {
            xb.core.input.raycaster.sortFunction = raycastSortFunction;
          }

          this.add(new THREE.HemisphereLight(0xffffff, 0x666666, 3));

          this.createUI();
        }

        createUI() {
          const card = this.uiCore.createCard({
            name: 'ProfileCard',
            sizeX: 1.2,
            sizeY: 1.0,
            position: new THREE.Vector3(0, 1.5, -1.5),
            behaviors: [
              new ManipulationBehavior({
                draggable: true,
                manipulationMargin: 100,
                manipulationCornerRadius: 60,
              }),
            ],
          });

          const panel = new UIPanel({
            width: '100%',
            height: '100%',
            fillColor: 'rgba(5, 5, 5, 0.6)',
            innerShadowColor: 'rgba(150, 150, 150, 0.05)',
            innerShadowBlur: 96,
            strokeWidth: 4,
            strokeColor: {
              gradientType: 'linear',
              rotation: 90,
              stops: [
                {position: 0, color: 'rgba(255, 255, 255, 0.5)'},
                {position: 0.5, color: 'rgba(255, 255, 255, 0.25)'},
                {position: 1, color: 'rgba(255, 255, 255, 0.35)'},
              ],
            },
            cornerRadius: 50,
            padding: 50,
            flexDirection: 'column',
            justifyContent: 'flex-start',
            alignItems: 'center',
            gap: 50,
          });
          card.add(panel);

          const title = new UIText('Welcome to UI Blocks', {
            fontSize: 64,
            fontWeight: 'bold',
            color: '#4796e3',
          });
          panel.add(title);

          const image = new UIImage('https://picsum.photos/id/10/400/300', {
            width: 400,
            height: 300,
            borderRadius: 40,
          });
          panel.add(image);

          const iconPanel = new UIPanel({
            flexDirection: 'row',
            gap: 60,
            width: '100%',
            height: 120,
            justifyContent: 'center',
            alignItems: 'center',
          });

          const createIconBtn = (iconName, color) => {
            let isHovered = false;

            const button = new UIPanel({
              width: 160,
              height: 160,
              cornerRadius: 40,
              fillColor: '#444444',
              justifyContent: 'center',
              alignItems: 'center',
              onHoverEnter: () => {
                isHovered = true;
                button.setFillColor('#666666');
              },
              onHoverExit: () => {
                isHovered = false;
                button.setFillColor('#444444');
              },
              onClick: () => {
                const flashGradient = {
                  gradientType: 'linear',
                  rotation: 90,
                  stops: [
                    {position: 0, color: '#4796E3'},
                    {position: 0.5, color: '#9177C7'},
                    {position: 1, color: '#CA6673'},
                  ],
                };

                button.setFillColor(flashGradient);

                setTimeout(() => {
                  if (isHovered) button.setFillColor('#666666');
                  else button.setFillColor('#444444');
                }, 200);
              },
            });

            const icon = new UIIcon(iconName, {
              width: 80,
              height: 80,
              color: color,
            });
            button.add(icon);

            return button;
          };

          iconPanel.add(createIconBtn('favorite', 'white'));
          iconPanel.add(createIconBtn('star', 'white'));
          panel.add(iconPanel);

          const desc = new UIText(
            'This sample card is built using uiblocks, featuring a panel, image, icons, and text. See more samples under the uiblocks folder.',
            {
              fontSize: 48,
              color: 'white',
              textAlign: 'center',
              width: '100%',
              flexShrink: 1,
            }
          );
          panel.add(desc);
        }
      }

      document.addEventListener('DOMContentLoaded', () => {
        const options = new xb.Options();
        options.enableUI();
        options.setAppTitle('uiblocks Sample');
        xb.add(new MainScript());
        xb.init(options);
      });
    </script>
  </body>
</html>
